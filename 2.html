<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>Student Registration</h1>
    <form>
    <label for="username">User Name: &nbsp; &nbsp;</label>
    <input type="text" name="name" id="name" placeholder="User Name">
    <br><br>
    <label for="mail id"> Mail id : &nbsp; &nbsp;</label>
    <input type="email" name="email" id="emailid" placeholder="Enter your email ID">
    <br><br>
    <label for="phone">Mobile number</label>
    <input type="tel" name="number" id="number" placeholder="Please enter your number">
    <br><br>
    <label for="date">Date: &nbsp; &nbsp;</label> 
    <input type="date" name="date" id="date">
    <br><br>
    <input type="radio" name="gender" id="gender">
    <label for="male">Male</label> 
    <input type="radio" name="gender" id="gender">
    <label for="Others">Others</label>
    <br><br>
    <label for="declaration">Declaration: &nbsp;</label>
    <input type="checkbox" name="declaration" id="declaratuion">
    <p>The information that is true and correct to the best of my Knowledge</p>
    <br><br>
    <label for="course">Courses offered: &nbsp;</label>
    <select name="course" id="course">
        <option value="select">--Select Course--</option>
        <option value="CSE">CSE</option>
        <option value="EEE">EEE</option>
        <option value="ECE">ECE</option>
    </select>
    <br><br>
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">
    <p>Do you have an account?<a href="login.html">Login</a></p>

    </form>



</body>
</html>
